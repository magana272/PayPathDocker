name: paypath-frontend

services:
  frontend:
    build:
      context: .
      args:
        # baked into the client bundle at build time; the browser calls this,
        # so it must be a URL reachable from the host
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000/api}
    ports:
      - "3000:3000"
